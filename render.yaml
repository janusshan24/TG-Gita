services:
  - type: web
    name: iskcon-gita-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # you'll paste this in the Render dashboard
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: TOP_K
        value: "5"
      - key: CHROMA_PATH
        value: ../data/chroma_db
      - key: CHROMA_COLLECTION
        value: bhagavad_gita
      - key: PYTHON_VERSION
        value: "3.11.0"
